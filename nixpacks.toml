# ─────────────────────────────────────────────────────────────────────
# Nixpacks config para Coolify
# ─────────────────────────────────────────────────────────────────────
# Soluciona el bug "$NIXPACKS_PATH undefined" agregando pip al
# profile de nix, y usa el requirements.prod.txt slim (12 paquetes)
# en lugar del requirements.txt legacy (33 paquetes) que no entraba
# en el disco del build container.
#
# Si el browser de Playwright falla al scrapear por libs de sistema
# faltantes (libnss3, libatk, libcups2, etc.), el build PASA pero el
# scraping falla en runtime. Resolver después con un Dockerfile custom
# que use la fase setup para instalar apt-packages de chromium.
# ─────────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = ["...", "pip"]

[phases.install]
cmd = "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.prod.txt && playwright install chromium"

[start]
cmd = "streamlit run src/ui/app.py --server.port=3000 --server.address=0.0.0.0 --server.headless=true"
