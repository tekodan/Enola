          - generic [ref=f13e153]: Qué es y cómo funciona la plataforma
        - generic [ref=f13e155]: Enola Investigadora Digital es una plataforma académica diseñada para detectar contenido de violencia de género en publicaciones de Facebook. Utiliza técnicas de RAG (Retrieval-Augmented Generation) combinando un modelo de lenguaje local (Ollama) con una base de conocimiento indexada en ChromaDB.
        - generic [ref=f13e156]: Permite a investigadores y revisores analizar, validar y generar reportes estadísticos sobre la incidencia de violencia de género digital, siguiendo una taxonomía de 6 categorías principales con 19 subdimensiones.
